name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Full local Supabase stack with every repo migration applied, so the
      # browser suite runs against a real database on every branch push.
      - name: Start local Supabase
        run: supabase start

      # tests/helpers/env.ts and the dev server both read .env.local. The
      # encryption key is the same non-secret test key pinned in
      # playwright.config.ts; it protects nothing outside this ephemeral DB.
      #
      # Key handling is adaptive: newer CLI versions hand out new-format
      # sb_secret_/sb_publishable_ keys that the data API rejects as bearer
      # tokens, so we probe the reported service key against PostgREST and,
      # if it fails, mint classic HS256 JWTs from the stack's JWT_SECRET and
      # verify those instead. Either way the step fails loudly if no working
      # service credential exists.
      - name: Write .env.local from the local stack
        run: |
          set -euo pipefail
          eval "$(supabase status -o env)"

          # Byte-exact reconstruction of the CLI's deterministic legacy JWTs:
          # header {"alg":"HS256","typ":"JWT"}, payload
          # {"iss":"supabase-demo","role":<role>,"exp":1983812996} — the same
          # strings the local Kong registers as consumers, so they pass its
          # exact-match apikey check.
          mint() {
            node -e '
              const c = require("crypto");
              const secret = process.env.JWT_SECRET || "super-secret-jwt-token-with-at-least-32-characters-long";
              const b64 = (s) => Buffer.from(s).toString("base64url");
              const header = b64(JSON.stringify({ alg: "HS256", typ: "JWT" }));
              const payload = b64(JSON.stringify({ iss: "supabase-demo", role: process.argv[1], exp: 1983812996 }));
              const sig = c.createHmac("sha256", secret).update(header + "." + payload).digest("base64url");
              console.log(header + "." + payload + "." + sig);
            ' "$1"
          }
          probe() {
            curl -s -o /dev/null -w '%{http_code}' \
              "$API_URL/rest/v1/profiles?select=user_id&limit=1" \
              -H "apikey: $1" -H "Authorization: Bearer $1"
          }
          works() {
            [ "$(probe "$1")" = "200" ]
          }

          SERVICE_KEY="$SERVICE_ROLE_KEY"
          ANON="$ANON_KEY"
          if ! works "$SERVICE_KEY"; then
            echo "Reported service key rejected by the data API (HTTP $(probe "$SERVICE_KEY")); minting legacy JWTs."
            SERVICE_KEY=$(JWT_SECRET="${JWT_SECRET:-}" mint service_role)
            ANON=$(JWT_SECRET="${JWT_SECRET:-}" mint anon)
            if ! works "$SERVICE_KEY"; then
              echo "Legacy service JWT also rejected (HTTP $(probe "$SERVICE_KEY"))." >&2
              echo "status -o env variables available:" >&2
              supabase status -o env | sed 's/=.*/=<set>/' >&2 || true
              exit 1
            fi
            echo "Legacy JWTs accepted."
          fi

          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=$API_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_KEY
          KODA_AI_MOCK=1
          KODA_INTEGRATIONS_MOCK=1
          KODA_TOKEN_ENC_KEY=VGhpc0lzQTMyQnl0ZVRlc3RPbmx5S2V5Rm9yS29kYSE=
          CRON_SECRET=ci-cron-secret
          EOF

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
